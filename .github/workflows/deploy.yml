name: Deploy to Google Cloud VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to GCP VM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Execute deployment commands via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_VM_HOST }}
          username: ${{ secrets.GCP_VM_USERNAME }}
          key: ${{ secrets.GCP_VM_SSH_KEY }}
          script: |
            # Di chuyển vào thư mục dự án (Thay đổi đường dẫn này theo server của bạn)
            cd /home/${{ secrets.GCP_VM_USERNAME }}/EduMate || { echo "Project directory not found! Please clone the repo first."; exit 1; }
            
            # Kéo code mới nhất từ nhánh main
            git pull origin main
            
            # Tự động tạo file .env từ GitHub Secrets
            echo "Tạo file .env từ GitHub Secrets..."
            echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}" > .env
            echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env
            echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}" >> .env
            echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env
            echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" >> .env
            echo "VITE_GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" >> .env
            echo "JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}" >> .env
            
            # Xây dựng lại và khởi động các containers với Docker Compose Prod
            docker compose -f docker-compose.prod.yml up -d --build
            
            # Dọn dẹp các images không còn sử dụng để giải phóng dung lượng ổ cứng
            docker image prune -f
