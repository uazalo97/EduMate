name: Deploy to Google Cloud VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to GCP VM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Execute deployment commands via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_VM_HOST }}
          username: ${{ secrets.GCP_VM_USERNAME }}
          key: ${{ secrets.GCP_VM_SSH_KEY }}
          script: |
            # Di chuyển vào thư mục dự án (Thay đổi đường dẫn này theo server của bạn)
            cd /home/${{ secrets.GCP_VM_USERNAME }}/EduMate || { echo "Project directory not found! Please clone the repo first."; exit 1; }
            
            # Kéo code mới nhất từ nhánh main
            git pull origin main
            
            # Xây dựng lại và khởi động các containers với Docker Compose Prod
            docker compose -f docker-compose.prod.yml up -d --build
            
            # Dọn dẹp các images không còn sử dụng để giải phóng dung lượng ổ cứng
            docker image prune -f
