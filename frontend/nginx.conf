# Block mặc định: Chặn tất cả các truy cập bằng địa chỉ IP (hoặc domain lạ)
# và tự động chuyển hướng (Redirect) về Tên miền chính thức của bạn
server {
    listen 80 default_server;
    server_name _;
    return 301 https://c2-app-065.io.vn$request_uri;
}

# Block chính thức: Chỉ phục vụ khi người dùng truy cập đúng Tên miền (hoặc localhost khi code máy nhà)
server {
    listen 80;
    server_name c2-app-065.io.vn www.c2-app-065.io.vn localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend container
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
